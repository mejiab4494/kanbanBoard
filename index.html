<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>Task Board</h1>
        <div class="rightBtns">
            <div class="auth-bar">
                <span id="userLabel" hidden></span>
                <button id="loginBtn">Sign in with Google</button>
                <button id="logoutBtn" hidden>Sign out</button>
            </div>
        <button class="resetBtn">Reset</button>
        </div>
</header>
    </header>
    
    <div class="kanban-board">
        <div class="toDo">
            <h1>TO DO</h1>
            <button class="addTaskButton">+ Add card</button>
        </div>
        <div class="inProgress">
            <h1>IN PROGRESS</h1>
            <button class="addTaskButton">+ Add card</button>
        </div>
        <div class="done">
            <h1>DONE</h1>
            <button class="addTaskButton">+ Add card</button>
        </div>
        <div class="newColumn">
            <button class="newBtnColumn">ADD NEW COLUMN</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
